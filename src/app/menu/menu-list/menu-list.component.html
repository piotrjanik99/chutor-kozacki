<div class="menu-list mt-5">
    <div class="menu-column">
      @for ( item of menuItems; track item.title) {
        <app-menu-list-item
          [itemTitle]="item.title"
          [itemDescription]="item.description"
          [itemPrice]="item.price"
        ></app-menu-list-item>
      }
    </div>
</div>
