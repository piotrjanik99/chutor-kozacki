<div #orderTop>
  <app-section-header [title]="'section.orderTitle' | translate:languageService.lang()" [subtitle]="'section.orderSubtitle' | translate:languageService.lang()" level="h1"></app-section-header>
</div>

<div class="container">
  <div class="order-card">
    <form [formGroup]="quoteForm" (ngSubmit)="submitQuote()" novalidate class="minimalist-style">
      <div class="mb-3">
        <label for="quoteEmail" class="form-label small text-muted">{{ 'order.email' | translate:languageService.lang() }}</label>
        <input type="text" id="quoteEmail" formControlName="email" class="form-control border-0 border-bottom rounded-0 px-0">
      </div>

      <div class="mb-3">
        <label for="eventType" class="form-label small text-muted">{{ 'order.eventType' | translate:languageService.lang() }}</label>
        <select id="eventType" formControlName="eventType" class="form-control border-0 border-bottom rounded-0 px-0" (change)="onEventTypeChange()">
          <option value="Wesele">{{ 'order.eventTypeWedding' | translate:languageService.lang() }}</option>
          <option value="Chrzciny/Komunia">{{ 'order.eventTypeCommunion' | translate:languageService.lang() }}</option>
          <option value="Urodziny">{{ 'order.eventTypeBirthday' | translate:languageService.lang() }}</option>
          <option value="Catering">{{ 'order.eventTypeCatering' | translate:languageService.lang() }}</option>
          <option value="Inna impreza">{{ 'order.eventTypeOther' | translate:languageService.lang() }}</option>
        </select>
      </div>

      @if (showOtherEventInput) {
        <div class="mb-3">
          <label for="otherEventType" class="form-label small text-muted">{{ 'order.otherEventType' | translate:languageService.lang() }}</label>
          <input type="text" id="otherEventType" formControlName="otherEventType" class="form-control border-0 border-bottom rounded-0 px-0">
        </div>
      }

      <div class="mb-3">
        <label for="guestCount" class="form-label small text-muted">{{ 'order.guestCount' | translate:languageService.lang() }}</label>
        <input type="number" id="guestCount" formControlName="guestCount" class="form-control border-0 border-bottom rounded-0 px-0" min="1">
      </div>

      <div class="mb-4">
        <label for="eventDescription" class="form-label small text-muted">{{ 'order.description' | translate:languageService.lang() }}</label>
        <textarea id="eventDescription" formControlName="eventDescription" rows="3" class="form-control border-0 border-bottom rounded-0 px-0"></textarea>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-dark rounded-pill py-2 text-uppercase fs-6 letter-spacing-1" [disabled]="quoteForm.invalid">{{ 'order.submit' | translate:languageService.lang() }}</button>
      </div>
    </form>
  </div>
</div>

<div class="row gx-0 footer mt-5">
  <app-footer></app-footer>
  <span class="footer-copyright">Chutor Kozacki </span>
</div>
