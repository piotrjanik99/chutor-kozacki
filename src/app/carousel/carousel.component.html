<div id="{{carouselId}}" class="carousel carousel-dark slide">
    <div class="carousel-indicators">
      <button *ngFor="let image of images(); let i = index"
              type="button"
              [attr.data-bs-target]="'#' + carouselId"
              [attr.data-bs-slide-to]="i"
              [class.active]="i === 0"
              [attr.aria-current]="i === 0 ? 'true' : null"
              [attr.aria-label]="'Slide ' + (i + 1)">
      </button>
    </div>
    <div class="carousel-inner">
      <div *ngFor="let image of images(); let i = index"
           class="carousel-item"
           [class.active]="i === 0">
        <div class="row">
          <div class="col-5">
            <img [ngSrc]="image" class="d-block" alt="..." width="350" height="350" loading="lazy">
          </div>
          <div class="col-7 d-flex justify-content-center align-items-center">
            <span>{{imageDescription()[i]}}</span>
          </div>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" [attr.data-bs-target]="'#' + carouselId" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" [attr.data-bs-target]="'#' + carouselId" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
