<div id="{{carouselId}}" class="carousel slide" #carouselRoot
     [style.--desc-h-base.px]="descriptionHeight().base"
     [style.--desc-h-md.px]="descriptionHeight().md"
     [style.--desc-h-lg.px]="descriptionHeight().lg">
  <div class="carousel-inner">
    <div *ngFor="let image of images(); let i = index"
         class="carousel-item"
         [class.active]="i === 0">
      <div class="slide-card">
        <div class="slide-image-wrap">
          <img [ngSrc]="image" class="slide-image" [alt]="imageTitle()[i]" width="400" height="400" loading="lazy">
        </div>
        <div class="slide-text" [class.has-scroll]="images().length > 1">
          <span class="slide-title">{{imageTitle()[i]}}</span>
          <span class="slide-divider"></span>
          <span class="slide-description" [class.clamped]="images().length > 1">{{imageDescription()[i]}}</span>
        </div>
      </div>
    </div>
  </div>

  @if (!hideButtons) {
    <div class="carousel-controls">
      <button class="carousel-arrow" type="button" [attr.data-bs-target]="'#' + carouselId" data-bs-slide="prev">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M10.5 13 6 8l4.5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="visually-hidden">Poprzedni</span>
      </button>

      <div class="carousel-dots">
        @for (image of images(); track image; let i = $index) {
          <button type="button"
                  class="carousel-dot"
                  [class.active]="i === activeIndex()"
                  [attr.data-bs-target]="'#' + carouselId"
                  [attr.data-bs-slide-to]="i"
                  [attr.aria-current]="i === activeIndex()"
                  [attr.aria-label]="'Przejdź do slajdu ' + (i + 1)">
          </button>
        }
      </div>

      <button class="carousel-arrow" type="button" [attr.data-bs-target]="'#' + carouselId" data-bs-slide="next">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M5.5 3 10 8l-4.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="visually-hidden">Następny</span>
      </button>
    </div>
  }
</div>
